<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi taller</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="layout-web" data-vista="mi-taller" data-role="admin">
    <aside class="sidebar-app" id="sidebar-app">
        <h2 id="titulo-rol">Menú Administrador</h2>
    </aside>
    <main class="contenido-principal" th:if="${taller != null}">
        <h1>Mi taller</h1>
        <div class="bloque-contenido bloque-destacado">
            <p class="texto-muted">Logo</p>
            <h2 th:text="${taller.nombre}">Nombre</h2>
        </div>
        <div class="tarjeta">
            <p><strong>Dirección:</strong> <span th:text="${taller.direccion}">—</span></p>
            <p><strong>Teléfono:</strong> <span th:text="${taller.telefono}">—</span></p>
            <p><strong>Descripción:</strong> <span th:text="${taller.descripcion}">—</span></p>
        </div>
        <p><strong>Calificación promedio:</strong></p>
        <div class="estrellas">
            <span th:each="i : ${#numbers.sequence(1, 5)}"
                  th:class="${i <= estrellasLlenas} ? 'activa' : ''">★</span>
        </div>
        <p class="texto-muted"
           th:text="|${taller.calificacionPromedio} / 5 (${taller.numValoraciones} valoraciones)|">0 / 5</p>
        <a th:href="@{/registrar-taller}" class="boton-principal">Editar</a>
    </main>
    <main class="contenido-principal" th:if="${taller == null}">
        <h1>Mi taller</h1>
        <p>Aún no hay información del taller.</p>
        <a th:href="@{/registrar-taller}" class="boton-principal">Registrar taller</a>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
