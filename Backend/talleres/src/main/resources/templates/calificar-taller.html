<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar taller</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="layout-web" data-vista="calificar-taller" data-role="user">
    <aside class="sidebar-app" id="sidebar-app">
        <h2 id="titulo-rol">Menú Usuario</h2>
    </aside>
    <main class="contenido-principal">
        <h1>Calificar taller</h1>
        <div th:if="${ultima != null}">
            <p style="margin-bottom: 1rem;">Tu última calificación enviada</p>
            <div class="tarjeta">
                <p><strong>Taller:</strong> <span th:text="${ultima.tallerNombre}">—</span></p>
                <p><strong>Servicio:</strong> <span th:text="${ultima.servicio}">—</span></p>
                <p><strong>Calificación:</strong> <span th:text="|${ultima.estrellas}/5 ★|">0/5</span></p>
                <p><strong>Comentario:</strong> <span th:text="${ultima.comentario}">—</span></p>
            </div>
        </div>
        <h2 style="font-size: 1.15rem; margin: 1.5rem 0 0.75rem;">Nueva calificación</h2>
        <form th:action="@{/calificar-taller}" th:object="${nuevaCalificacion}" method="post">
            <input type="text" th:field="*{tallerNombre}" placeholder="Nombre del taller" required>
            <input type="text" th:field="*{servicio}" placeholder="Servicio que calificas (ej. Cambio de aceite)" required>
            <label for="estrellas">Calificación (1 a 5)</label>
            <select id="estrellas" th:field="*{estrellas}" required>
                <option value="5">5 estrellas</option>
                <option value="4">4 estrellas</option>
                <option value="3">3 estrellas</option>
                <option value="2">2 estrellas</option>
                <option value="1">1 estrella</option>
            </select>
            <textarea th:field="*{comentario}" placeholder="Escribe tu comentario o reseña..."></textarea>
            <button type="submit" class="boton-principal">Enviar calificación</button>
        </form>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
