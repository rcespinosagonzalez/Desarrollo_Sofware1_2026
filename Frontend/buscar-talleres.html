<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar talleres</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
</head>
<body class="layout-web pagina-buscar-talleres" data-vista="buscar-talleres" data-role="user">
    <aside class="sidebar-app" id="sidebar-app">
        <h2 id="titulo-rol">Menú Usuario</h2>
    </aside>
    <main class="contenido-principal contenido-buscar">
        <header class="cabecera-buscar">
            <h1>Buscar talleres</h1>
            <p class="texto-muted cabecera-buscar-sub">Escribe una ciudad o barrio y revisa los resultados en el mapa y en la lista.</p>
        </header>

        <div class="busqueda-fila">
            <div class="busqueda-campo">
                <span class="icono-lupa" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="7"/>
                        <path d="M21 21l-4.3-4.3"/>
                    </svg>
                </span>
                <input type="text" id="input-busqueda-lugar" class="input-buscar-ui" placeholder="Ej. Cartagena, Medellín…" autocomplete="off">
            </div>
            <button type="button" id="btn-buscar-lugar" class="boton-principal boton-buscar-inline">Buscar</button>
        </div>
        <p class="texto-muted estado-busqueda-linea" id="estado-busqueda"></p>

        <div class="layout-mapa-resultados">
            <div class="area-mapa area-mapa-compacta">
                <div id="mapa-talleres" class="mapa-real" aria-label="Mapa de talleres"></div>
            </div>
            <aside class="panel-resultados-osm">
                <div class="panel-resultados-osm-cabecera">
                    <h2 class="panel-resultados-titulo">Resultados en la zona</h2>
                    <button type="button" id="btn-ver-en-mapa" class="boton-ajuste-mapa" title="Ajustar mapa a todos los puntos">Ajustar mapa</button>
                </div>
                <section id="lista-talleres" class="lista-resultados-scroll" aria-live="polite"></section>
            </aside>
        </div>

        <section class="bloque-talleres-bd">
            <h2 class="subtitulo-seccion">Talleres en la aplicación</h2>
            <p class="texto-muted subtitulo-seccion-desc">Abre esta página desde Spring Boot (localhost:8080) para ver los de la base de datos.</p>
        </section>
    </main>
    <script src="js/app.js"></script>
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="js/buscar-talleres.js"></script>
</body>
</html>
