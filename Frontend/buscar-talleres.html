<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar talleres</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
</head>
<body class="layout-web" data-vista="buscar-talleres" data-role="user">
    <aside class="sidebar-app" id="sidebar-app">
        <h2 id="titulo-rol">Menú Usuario</h2>
    </aside>
    <main class="contenido-principal">
        <h1>Buscar talleres</h1>
        <div class="busqueda-contenedor">
            <span class="icono-lupa">🔍</span>
            <input type="text" id="input-busqueda-lugar" placeholder="Cartagena, barrio o direccion">
            <button type="button" id="btn-buscar-lugar" class="boton-principal">Buscar</button>
        </div>
        <p class="texto-muted" id="estado-busqueda"></p>
        <div class="area-mapa">
            <div id="mapa-talleres" class="mapa-real" aria-label="Mapa de talleres"></div>
        </div>
        <section id="lista-talleres"></section>
        <button type="button" id="btn-ver-en-mapa" class="boton-principal">Ver resultados en mapa</button>
    </main>
    <script src="js/app.js"></script>
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="js/buscar-talleres.js"></script>
</body>
</html>
